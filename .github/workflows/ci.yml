name: CI

# Runs on PRs targeting master and on pushes to any non-master branch.
# Pushes to master are covered by deploy.yml, so we don't double-run.
on:
  pull_request:
    branches: [master]
  push:
    branches-ignore: [master]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Test (Vitest)
        run: npm test

      - name: Build (Vite)
        # A successful build is the strongest single signal that the site
        # will still load on Pages. If this fails the deploy would too.
        run: npm run build
